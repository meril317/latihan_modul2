<!DOCTYPE html>
<html>
<head>
    <title>Responsive Grid Layout</title>
    <style>
        body {
            background-color: lightblue; /* Desktop */
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 kolom */
            gap: 15px;
        }

        .grid-item {
            background-color: #2196F3;
            color: white;
            padding: 30px;
            text-align: center;
            font-size: 20px;
            border-radius: 8px;
        }

        /* Tampilan untuk layar maksimal 600px */
        @media only screen and (max-width: 600px) {
            body {
                background-color: lightcoral; /* Smartphone */
            }

            .grid-container {
                grid-template-columns: 1fr; /* Menjadi 1 kolom */
            }
        }
    </style>
</head>
<body>

    <h2>Responsive Grid Layout</h2>

    <div class="grid-container">
        <div class="grid-item">Item 1</div>
        <div class="grid-item">Item 2</div>
        <div class="grid-item">Item 3</div>
    </div>

</body>
</html>
