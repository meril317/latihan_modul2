<!DOCTYPE html>
<html>
<head>
    <title>Flexbox 3 Item</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around; /* item tersebar merata */
            align-items: center;           /* sejajar di tengah */
            height: 200px;
            border: 2px solid black;
        }

        .item {
            background-color: lightcoral;
            padding: 20px;
            margin: 10px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>

</body>
</html>
