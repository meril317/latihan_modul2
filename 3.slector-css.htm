<!DOCTYPE html>
<html>
<head>
    <title>Selector CSS</title>

    <style>
        body {
            background-color: pink;
        }

        .kelas1 {
            background-color: lightyellow;
            color: blue;
        }

        .kelas2 {
            background-color: lightgreen;
            color: red;
        }

        .kelas3 {
            background-color: lightcyan;
            color: purple;
        }

        #judul {
            font-size: 30px;
            color: navy;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 id="judul">Praktikum CSS</h1>

    <p class="kelas1">Paragraf Kelas 1</p>

    <p class="kelas2">Paragraf Kelas 2</p>

    <p class="kelas3">Paragraf Kelas 3</p>

</body>
</html>
