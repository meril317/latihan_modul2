<!DOCTYPE html>
<html>
<head>
    <title>Latihan CSS Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 kolom */
            grid-template-rows: repeat(2, 100px); /* 2 baris */
            gap: 15px; /* jarak antar grid */
            padding: 15px;
        }

        .grid-item {
            color: white;
            font-size: 20px;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
        }

        .item1 {
            background-color: red;
            grid-column: span 2; /* menempati 2 kolom */
        }

        .item2 { background-color: blue; }
        .item3 { background-color: green; }
        .item4 { background-color: orange; }
        .item5 { background-color: purple; }
        .item6 { background-color: brown; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="grid-item item1">1</div>
        <div class="grid-item item2">2</div>
        <div class="grid-item item3">3</div>
        <div class="grid-item item4">4</div>
        <div class="grid-item item5">5</div>
        <div class="grid-item item6">6</div>
    </div>

</body>
</html>
