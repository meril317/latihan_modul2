<!DOCTYPE html>
<html>
<head>
    <title>Latihan CSS</title>
    <style>
        body {
            background-color: lightyellow;
        }

        h1 {
            color: red;
            text-align: center;
        }

        p {
            color: blue;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Selamat Datang di Praktikum CSS</h1>

    <p>
        Ini adalah contoh teks yang diatur menggunakan CSS.
        CSS digunakan untuk mengubah warna, ukuran, posisi,
        dan tampilan elemen HTML agar lebih menarik.
    </p>

</body>
</html>
